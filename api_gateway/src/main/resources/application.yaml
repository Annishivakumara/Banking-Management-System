server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. Customer Service Route
        - id: customer-service
          uri: lb://customer-service   # Changed from localhost:8081
          predicates:
            - Path=/customer/**
          filters:
            - StripPrefix=1

        # 2. Account Service Route
        - id: account-service
          uri: lb://account-service    # Changed from localhost:8082
          predicates:
            - Path=/account/**
          filters:
            - StripPrefix=1

        # 3. Transaction Service Route
        - id: transaction-service
          uri: lb://transaction-service # Changed from localhost:8083
          predicates:
            - Path=/transaction/**
          filters:
            - StripPrefix=1

        # 4. Loan Service Route
        - id: loan-service
          uri: lb://loan-service       # Changed from localhost:8084
          predicates:
            - Path=/loan/**
          filters:
            - StripPrefix=1

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    transport:
      # Change client-tye to client-type
      client-type: webclient