spring.application.name=customer-service
server.port=8081

# CHANGED: Added createDatabaseIfNotExist=true to handle automatic database creation
spring.datasource.url=jdbc:mysql://localhost:3306/customer_db2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=vikas123

# This automatically handles creating/updating tables inside the DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OPTIMIZED: Using the updated, modern dialect for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Swagger / OpenAPI setup
springdoc.swagger-ui.path=/swagger-ui.html